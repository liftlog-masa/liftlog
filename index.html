<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LIFTLOG">
<title>LIFTLOG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e8e6f0;font-family:-apple-system,system-ui,sans-serif;min-height:100vh}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:inherit;font-size:16px;color:#e8e6f0}
.card{background:#18181f;border:1px solid #2a2a38;border-radius:12px;padding:14px;margin-bottom:13px}
.lbl{font-size:11px;font-weight:700;letter-spacing:.08em;color:#9ca3af;text-transform:uppercase;margin-bottom:5px;display:block}
.inp{width:100%;background:#0f0f13;border:1px solid #2a2a38;border-radius:8px;color:#e8e6f0;padding:10px;outline:none;font-size:16px;display:block}
.inp:focus{border-color:#c084fc}
.row{display:flex;gap:8px}
.tabs{display:flex;background:#18181f;border-bottom:1px solid #2a2a38;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:11px 2px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:none;color:#6b7280;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:#c084fc;border-bottom-color:#c084fc}
.badge{background:#22c55e22;color:#22c55e;border-radius:8px;padding:8px;text-align:center;font-weight:600;margin-bottom:12px}
.body{padding:14px;max-width:520px;margin:0 auto}
.pbtn{background:#c084fc;color:#0f0f13;border:none;border-radius:8px;padding:12px;font-weight:700;font-size:15px;cursor:pointer;width:100%;margin-top:4px}
.sbtn{background:#23232e;color:#9ca3af;border:none;border-radius:8px;padding:6px 12px;font-weight:600;font-size:12px;cursor:pointer}
.dbtn{background:#2a1a1a;color:#f87171;border:none;border-radius:8px;padding:8px 10px;font-weight:600;font-size:13px;cursor:pointer}
.ibtn{background:none;border:none;color:#4b5563;cursor:pointer;font-size:18px;padding:4px 6px;line-height:1}
.empty{text-align:center;color:#6b7280;padding:48px 20px}
.pgbar{background:#0f0f1380;border-radius:99px;height:6px;margin-top:10px}
.pgfill{background:linear-gradient(90deg,#38bdf8,#c084fc);border-radius:99px;height:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:7px 4px;border-bottom:1px solid #2a2a38}
.stag{background:#23232e;border-radius:5px;padding:3px 8px;font-size:11px;color:#d1d5db;display:inline-block;margin:2px}
.dtag{background:#1e1230;border-radius:5px;padding:2px 8px;font-size:10px;color:#c084fc;display:inline-block;margin:2px 2px 2px 10px}
.cnd{border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
.snb{background:#23232e;border:none;border-radius:6px;font-size:10px;font-weight:700;padding:5px 6px;cursor:pointer}
select option{background:#18181f}
</style>
</head>
<body>
<div id="hdr"></div>
<div id="tbs"></div>
<div id="cnt"></div>

<script>
// ======== データ ========
const EX0=["ベンチプレス","スクワット","デッドリフト","ショルダープレス","懸垂","ダンベルカール","レッグプレス"];
const CONDS=["最高","良い","普通","やや疲れ","疲れ"];
const CC={"最高":"#22c55e","良い":"#86efac","普通":"#facc15","やや疲れ":"#fb923c","疲れ":"#f87171"};
const GS=78.2,GT=70.0,GD="2027-12-31";

function ls(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function td(){return new Date().toISOString().slice(0,10);}
function dur(m){if(!m)return"—";return(Math.floor(m/60)>0?Math.floor(m/60)+"時間":"")+m%60+"分";}
function ns(){return{w:"",r:"",as:null,dr:[]};}
function clone(x){return JSON.parse(JSON.stringify(x));}

// ======== 状態 ========
const S={
  tab:"record",
  logs:ls("wt_logs")||[],
  wl:ls("wt_wl")||[],
  exo:ls("wt_exo")||[...EX0],
  mr:ls("wt_mr")||{},
  dt:td(),du:"",co:"良い",me:"",bw:"",
  exs:[{nm:EX0[0],sets:[ns()]}],
  ce:"",em:{},sv:false,
  wd:td(),wv:"",ws:false,
  mx:EX0[0],mv:"",ms:false,
  gx:EX0[0],
};

function allEx(){return[...new Set([...S.exo,...S.logs.flatMap(l=>(l.exs||[]).map(e=>e.nm))])];}

// ======== DOM ヘルパー ========
function el(tag,cls,st,...ch){
  const d=document.createElement(tag);
  if(cls)d.className=cls;
  if(st)Object.assign(d.style,st);
  ch.flat(9).forEach(c=>{
    if(c==null||c===false)return;
    d.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return d;
}
function on(el,ev,fn){el.addEventListener(ev,fn);return el;}
function inp(cls,ph,val,mode,onv){
  // onv = 値が変わったときのコールバック。draw()は呼ばない
  const i=document.createElement("input");
  i.className=cls||"inp";
  i.type="text";
  if(mode)i.setAttribute("inputmode",mode);
  i.placeholder=ph||"";
  i.value=val||"";
  if(onv)i.addEventListener("input",e=>{onv(e.target.value);});
  return i;
}
function btn(cls,txt,fn){const b=document.createElement("button");b.className=cls;b.textContent=txt;b.addEventListener("click",fn);return b;}
function sel(opts,val,fn){
  const s=document.createElement("select");
  s.className="inp";
  opts.forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;if(o===val)op.selected=true;s.appendChild(op);});
  s.addEventListener("change",e=>fn(e.target.value));
  return s;
}

// ======== 再描画 ========
// draw() はタブ切り替え・構造変化のみ。input値更新では呼ばない
function draw(){
  // ヘッダー
  const hdr=document.getElementById("hdr");
  if(!hdr.hasChildNodes()){
    hdr.style.cssText="background:#18181f;border-bottom:1px solid #2a2a38;padding:13px 16px;display:flex;align-items:center;gap:10px";
    const logo=el("span",null,null);
    const l1=el("span",null,{color:"#c084fc",fontSize:"20px",fontWeight:800,letterSpacing:"-0.5px"},"LIFT");
    const l2=el("span",null,{color:"#e8e6f0",fontSize:"20px",fontWeight:800},"LOG");
    logo.appendChild(l1);logo.appendChild(l2);
    hdr.appendChild(logo);
    hdr.appendChild(el("span",null,{fontSize:"11px",color:"#6b7280",marginLeft:"4px"},"筋トレ記録"));
  }

  // タブ
  const tbs=document.getElementById("tbs");
  tbs.innerHTML="";
  tbs.className="tabs";
  [["record","📝 記録"],["history","📋 履歴"],["weight","⚖️ 体重"],["max","💪 MAX"],["graph","📈 グラフ"]].forEach(([k,l])=>{
    const b=btn("tab"+(S.tab===k?" on":""),l,()=>{S.tab=k;draw();});
    tbs.appendChild(b);
  });

  // コンテンツ
  const cnt=document.getElementById("cnt");
  cnt.innerHTML="";
  if(S.tab==="record")cnt.appendChild(buildRecord());
  else if(S.tab==="history")cnt.appendChild(buildHistory());
  else if(S.tab==="weight")cnt.appendChild(buildWeight());
  else if(S.tab==="max")cnt.appendChild(buildMax());
  else if(S.tab==="graph")cnt.appendChild(buildGraph());
}

// ======== 記録タブ ========
function buildRecord(){
  const div=el("div","body");
  if(S.sv){const b=el("div","badge",null,"✅ 保存しました！");div.appendChild(b);}

  // 日付・時間・体重
  const c1=el("div","card");
  const row1=el("div","row");
  const d1=el("div",null,{flex:1});
  d1.appendChild(el("label","lbl",null,"日付"));
  const di=document.createElement("input");di.className="inp";di.type="date";di.value=S.dt;
  di.addEventListener("change",e=>{S.dt=e.target.value;});
  d1.appendChild(di);
  const d2=el("div",null,{flex:1});
  d2.appendChild(el("label","lbl",null,"時間（分）"));
  d2.appendChild(inp("inp","60",S.du,"numeric",v=>{S.du=v;}));
  row1.appendChild(d1);row1.appendChild(d2);c1.appendChild(row1);
  const d3=el("div",null,{marginTop:"9px"});
  d3.appendChild(el("label","lbl",null,"体重 (kg)"));
  d3.appendChild(inp("inp","72.5",S.bw,"decimal",v=>{S.bw=v;}));
  c1.appendChild(d3);div.appendChild(c1);

  // 体調
  const c2=el("div","card");
  c2.appendChild(el("label","lbl",null,"体調"));
  const cRow=el("div",null,{display:"flex",gap:"6px",flexWrap:"wrap"});
  CONDS.forEach(c=>{
    const b=document.createElement("button");
    b.className="cnd";
    b.textContent=c;
    b.style.background=S.co===c?CC[c]:"#23232e";
    b.style.color=S.co===c?"#0f0f13":"#9ca3af";
    b.addEventListener("click",()=>{S.co=c;draw();});
    cRow.appendChild(b);
  });
  c2.appendChild(cRow);div.appendChild(c2);

  // 種目
  S.exs.forEach((ex,i)=>{
    const card=el("div","card");
    const nmRow=el("div",null,{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"});

    if(S.em[i]==="text"){
      // テキスト入力モード（ペンを押した後）
      const ti=document.createElement("input");
      ti.className="inp";ti.type="text";ti.value=ex.nm;ti.style.flex="1";
      ti.addEventListener("input",e=>{S.exs[i].nm=e.target.value;});
      ti.addEventListener("blur",e=>{confirmEx(i,e.target.value);});
      ti.addEventListener("keydown",e=>{if(e.key==="Enter")confirmEx(i,e.target.value);});
      nmRow.appendChild(ti);
      // オートフォーカス
      setTimeout(()=>ti.focus(),50);
    } else {
      const ax=allEx();
      nmRow.appendChild(sel(ax,ex.nm,v=>{S.exs[i].nm=v;}));
    }

    // ✏️ ペンボタン
    const penB=document.createElement("button");
    penB.style.cssText="background:#23232e;border:none;border-radius:6px;font-size:13px;padding:7px 9px;cursor:pointer;flex-shrink:0;color:"+(S.em[i]==="text"?"#c084fc":"#6b7280");
    penB.textContent="✏️";
    penB.addEventListener("click",()=>{
      S.em={...S.em,[i]:S.em[i]==="text"?"sel":"text"};
      draw();
    });
    nmRow.appendChild(penB);

    if(S.exs.length>1){
      const rb=btn("dbtn","✕",()=>{S.exs.splice(i,1);draw();});
      rb.style.padding="7px 10px";
      nmRow.appendChild(rb);
    }
    card.appendChild(nmRow);

    // セットヘッダー
    const sh=el("div",null,{display:"grid",gridTemplateColumns:"18px 1fr 1fr auto",gap:"5px",marginBottom:"6px"});
    sh.appendChild(el("span"));
    sh.appendChild(el("span",null,{fontSize:"10px",color:"#6b7280",fontWeight:700,textAlign:"center"},"重量kg"));
    sh.appendChild(el("span",null,{fontSize:"10px",color:"#6b7280",fontWeight:700,textAlign:"center"},"回数"));
    sh.appendChild(el("span"));
    card.appendChild(sh);

    // セット行
    ex.sets.forEach((s,j)=>{
      const sd=el("div",null,{marginBottom:"10px"});
      const mr=el("div",null,{display:"flex",alignItems:"center",gap:"4px"});
      mr.appendChild(el("span",null,{width:"18px",fontSize:"11px",color:"#6b7280",fontWeight:700,textAlign:"center",flexShrink:0},j+1));

      // 重量
      const wi=document.createElement("input");
      wi.className="inp";wi.type="text";wi.setAttribute("inputmode","decimal");
      wi.placeholder="kg";wi.value=s.w||"";wi.style.flex="1";
      wi.addEventListener("input",e=>{S.exs[i].sets[j].w=e.target.value;});
      mr.appendChild(wi);
      mr.appendChild(el("span",null,{color:"#4b5563",fontSize:"12px",flexShrink:0},"×"));

      // 回数
      const ri=document.createElement("input");
      ri.className="inp";ri.type="text";ri.setAttribute("inputmode","numeric");
      ri.placeholder="rep";ri.value=s.r||"";ri.style.flex="1";
      ri.addEventListener("input",e=>{S.exs[i].sets[j].r=e.target.value;});
      mr.appendChild(ri);

      // 補助ボタン
      const asB=document.createElement("button");
      asB.className="snb";asB.textContent="補";
      asB.style.background=s.as!=null?"#38bdf822":"#23232e";
      asB.style.color=s.as!=null?"#38bdf8":"#6b7280";
      asB.addEventListener("click",()=>{S.exs[i].sets[j].as=s.as!=null?null:"";draw();});
      mr.appendChild(asB);

      // Dropボタン
      const dpB=document.createElement("button");
      dpB.className="snb";dpB.textContent="Drop";
      dpB.style.background=s.dr&&s.dr.length?"#c084fc22":"#23232e";
      dpB.style.color=s.dr&&s.dr.length?"#c084fc":"#6b7280";
      dpB.addEventListener("click",()=>{S.exs[i].sets[j].dr=[...(S.exs[i].sets[j].dr||[]),{w:"",r:""}];draw();});
      mr.appendChild(dpB);

      if(ex.sets.length>1){
        mr.appendChild(btn("ibtn","−",()=>{S.exs[i].sets.splice(j,1);draw();}));
      }
      sd.appendChild(mr);

      // 補助入力
      if(s.as!=null){
        const ar=el("div",null,{display:"flex",alignItems:"center",gap:"6px",marginTop:"5px",paddingLeft:"24px"});
        ar.appendChild(el("span",null,{fontSize:"11px",color:"#38bdf8",fontWeight:700,flexShrink:0},"＋補助"));
        const ai=document.createElement("input");
        ai.className="inp";ai.type="text";ai.setAttribute("inputmode","numeric");
        ai.placeholder="補助rep数";ai.value=s.as||"";ai.style.flex="1";
        ai.style.borderColor="#38bdf844";ai.style.color="#38bdf8";
        ai.addEventListener("input",e=>{S.exs[i].sets[j].as=e.target.value;});
        ar.appendChild(ai);
        ar.appendChild(el("span",null,{fontSize:"11px",color:"#38bdf8"},"rep"));
        sd.appendChild(ar);
      }

      // ドロップセット
      (s.dr||[]).forEach((d,di)=>{
        const dr=el("div",null,{display:"flex",alignItems:"center",gap:"4px",marginTop:"5px",paddingLeft:"24px"});
        dr.appendChild(el("span",null,{fontSize:"10px",color:"#c084fc",fontWeight:700,flexShrink:0},`↓Drop${di+1}`));
        const dw=document.createElement("input");
        dw.className="inp";dw.type="text";dw.setAttribute("inputmode","decimal");
        dw.placeholder="kg";dw.value=d.w||"";dw.style.flex="1";
        dw.style.borderColor="#c084fc44";dw.style.color="#c084fc";
        dw.addEventListener("input",e=>{S.exs[i].sets[j].dr[di].w=e.target.value;});
        dr.appendChild(dw);
        dr.appendChild(el("span",null,{color:"#4b5563",fontSize:"12px",flexShrink:0},"×"));
        const drr=document.createElement("input");
        drr.className="inp";drr.type="text";drr.setAttribute("inputmode","numeric");
        drr.placeholder="rep";drr.value=d.r||"";drr.style.flex="1";
        drr.style.borderColor="#c084fc44";drr.style.color="#c084fc";
        drr.addEventListener("input",e=>{S.exs[i].sets[j].dr[di].r=e.target.value;});
        dr.appendChild(drr);
        dr.appendChild(btn("ibtn","−",()=>{S.exs[i].sets[j].dr.splice(di,1);draw();}));
        sd.appendChild(dr);
      });

      card.appendChild(sd);
    });

    card.appendChild(btn("sbtn","＋ セット追加",()=>{S.exs[i].sets.push(ns());draw();}));
    div.appendChild(card);
  });

  // カスタム種目
  const cc=el("div","card",{padding:"10px"});
  const cr=el("div","row");
  const ci=document.createElement("input");
  ci.className="inp";ci.type="text";ci.placeholder="カスタム種目名を追加";ci.value=S.ce;ci.style.flex="1";
  ci.addEventListener("input",e=>{S.ce=e.target.value;});
  ci.addEventListener("keydown",e=>{if(e.key==="Enter")addCE();});
  cr.appendChild(ci);
  cr.appendChild(btn("sbtn","追加",addCE));
  cc.appendChild(cr);div.appendChild(cc);

  const addExBtn=btn("sbtn","＋ 種目を追加",()=>{S.exs.push({nm:S.exo[0],sets:[ns()]});draw();});
  addExBtn.style.cssText="width:100%;margin-bottom:12px";
  div.appendChild(addExBtn);

  // メモ
  const mc=el("div","card");
  mc.appendChild(el("label","lbl",null,"メモ"));
  const ta=document.createElement("textarea");
  ta.className="inp";ta.style.minHeight="64px";ta.style.resize="vertical";
  ta.placeholder="今日のトレーニングについて...";ta.value=S.me;
  ta.addEventListener("input",e=>{S.me=e.target.value;});
  mc.appendChild(ta);div.appendChild(mc);

  div.appendChild(btn("pbtn","💾 記録を保存",saveLog));
  return div;
}

function confirmEx(i,name){
  const t=name.trim();if(!t)return;
  S.exs[i].nm=t;
  if(!S.exo.includes(t)){S.exo.push(t);lss("wt_exo",S.exo);}
  S.em={...S.em,[i]:"sel"};
  draw();
}
function addCE(){
  const n=S.ce.trim();
  if(n&&!S.exo.includes(n)){S.exo.push(n);lss("wt_exo",S.exo);}
  S.ce="";draw();
}
function saveLog(){
  const log={id:Date.now(),date:S.dt,duration:Number(S.du)||0,condition:S.co,memo:S.me,exs:clone(S.exs),bw:Number(S.bw)||null};
  S.logs.unshift(log);lss("wt_logs",S.logs);
  S.exs=[{nm:S.exo[0],sets:[ns()]}];S.du="";S.me="";S.co="良い";S.bw="";S.sv=true;
  draw();setTimeout(()=>{S.sv=false;draw();},2000);
}

// ======== 履歴タブ ========
function buildHistory(){
  const div=el("div","body");
  if(!S.logs.length){
    div.appendChild(el("div","empty",null,el("div",null,{fontSize:"40px",marginBottom:"12px"},"🏋️"),el("div",null,{fontWeight:600},"まだ記録がありません")));
    return div;
  }
  S.logs.forEach(log=>{
    const card=el("div","card");
    const top=el("div",null,{display:"flex",justifyContent:"space-between",alignItems:"flex-start"});
    const info=el("div");
    info.appendChild(el("div",null,{fontSize:"14px",fontWeight:700,color:"#e8e6f0",marginBottom:"3px"},log.date));
    const meta=el("div",null,{fontSize:"12px",color:"#6b7280",marginBottom:"6px"});
    if(log.duration)meta.appendChild(document.createTextNode(`⏱ ${dur(log.duration)} `));
    if(log.condition){
      const p=el("span",null,{display:"inline-block",padding:"2px 8px",borderRadius:"99px",fontSize:"11px",fontWeight:600,background:(CC[log.condition]||"#888")+"22",color:CC[log.condition]||"#888"},log.condition);
      meta.appendChild(p);
    }
    if(log.bw)meta.appendChild(document.createTextNode(` ⚖️ ${log.bw}kg`));
    info.appendChild(meta);top.appendChild(info);
    top.appendChild(btn("ibtn","🗑",()=>{S.logs=S.logs.filter(l=>l.id!==log.id);lss("wt_logs",S.logs);draw();}));
    card.appendChild(top);
    (log.exs||[]).forEach(ex=>{
      const ed=el("div",null,{marginBottom:"7px"});
      ed.appendChild(el("div",null,{fontSize:"12px",fontWeight:700,color:"#c084fc",marginBottom:"4px"},ex.nm));
      const tags=el("div",null,{display:"flex",flexWrap:"wrap"});
      (ex.sets||[]).forEach((s,j)=>{
        const tw=el("div",null,{display:"flex",flexDirection:"column"});
        let txt=`${j+1}: ${s.w||"—"}kg×${s.r||"—"}rep`;
        if(s.as!=null&&s.as!=="")txt+=` +(${s.as}補助)`;
        tw.appendChild(el("span","stag",null,txt));
        (s.dr||[]).forEach(d=>tw.appendChild(el("span","dtag",null,`↓ ${d.w||"—"}kg×${d.r||"—"}rep`)));
        tags.appendChild(tw);
      });
      ed.appendChild(tags);card.appendChild(ed);
    });
    if(log.memo)card.appendChild(el("div",null,{marginTop:"6px",fontSize:"11px",color:"#9ca3af",borderTop:"1px solid #2a2a38",paddingTop:"6px"},`💬 ${log.memo}`));
    div.appendChild(card);
  });
  return div;
}

// ======== 体重タブ ========
function tues(s,e){
  // 2025-06-24が火曜日と確定
  // YYYY-MM-DD → 経過日数（グレゴリオ暦）
  function days(str){
    const p=str.split("-"),y=+p[0],m=+p[1],d=+p[2];
    let total=y*365+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400);
    const md=[0,31,28,31,30,31,30,31,31,30,31,30,31];
    const leap=(y%4===0&&y%100!==0)||(y%400===0);
    if(leap)md[2]=29;
    for(let i=1;i<m;i++)total+=md[i];
    return total+d;
  }
  function addDays(str,n){
    const p=str.split("-");
    const dt=new Date(+p[0],+p[1]-1,+p[2]+n);
    return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
  }
  const BASE="2026-06-23"; // 確実な火曜日（2026年6月23日）
  const baseD=days(BASE);
  const startD=days(s);
  const endD=days(e);
  // startから最初の火曜日を求める
  let diff=(startD-baseD)%7;
  if(diff<0)diff+=7;
  // diffが0なら既に火曜、それ以外は次の火曜まで(7-diff)日後
  const toNext=diff===0?0:7-diff;
  const firstD=startD+toNext;
  if(firstD>endD)return[];
  const r=[];
  for(let d=firstD;d<=endD;d+=7)r.push(addDays(BASE,d-baseD));
  return r;
}

function sched(sw,tw,sd,ed){
  const t=tues(sd,ed);if(!t.length)return{};
  const s={};
  t.forEach((d,i)=>{
    if(i===0){s[d]=78.2;}
    else{
      // i=1: 77.8, i=2: 77.7, ..., i=79: 70.0
      const w=Math.round((77.8-0.1*(i-1))*10)/10;
      s[d]=w;
    }
  });
  return s;
}

function buildWeightGraph(){
  const allBw=[...S.wl,...S.logs.filter(l=>l.bw).map(l=>({date:l.date,bw:l.bw}))].sort((a,b)=>a.date.localeCompare(b.date));
  if(allBw.length<2)return null;

  const svg=ns2("svg");svg.setAttribute("viewBox",`0 0 ${W} ${H}`);svg.style.width="100%";svg.style.display="block";
  // グリッド線と目盛り
  [0,1,2].forEach(i=>{
    const y=pd+(H-pd*2)*(i/2),v=(maxV-(maxV-minV)*i/2).toFixed(1);
    const ln=ns2("line");ln.setAttribute("x1",pd);ln.setAttribute("y1",y);ln.setAttribute("x2",W-pd);ln.setAttribute("y2",y);ln.setAttribute("stroke","#2a2a38");ln.setAttribute("stroke-dasharray","3 3");svg.appendChild(ln);
    const tx=ns2("text");tx.setAttribute("x",pd-3);tx.setAttribute("y",y+4);tx.setAttribute("font-size","8");tx.setAttribute("fill","#6b7280");tx.setAttribute("text-anchor","end");tx.textContent=v;svg.appendChild(tx);
  });
  // 目標ライン
  const gy=H-pd-(H-pd*2)*((GT-minV)/rng);

  const gt2=ns2("text");gt2.setAttribute("x",W-pd);gt2.setAttribute("y",gy-3);gt2.setAttribute("font-size","8");gt2.setAttribute("fill","#f87171");gt2.setAttribute("text-anchor","end");gt2.textContent=`目標${GT}kg`;svg.appendChild(gt2);

  pts.forEach(p=>{const c=ns2("circle");c.setAttribute("cx",p[0]);c.setAttribute("cy",p[1]);c.setAttribute("r","4");c.setAttribute("fill","#38bdf8");svg.appendChild(c);});
  [pts[0],pts[pts.length-1]].forEach(p=>{const tx=ns2("text");tx.setAttribute("x",p[0]);tx.setAttribute("y",H-3);tx.setAttribute("font-size","8");tx.setAttribute("fill","#6b7280");tx.setAttribute("text-anchor","middle");tx.textContent=p[2].slice(5);svg.appendChild(tx);});
  const card=el("div","card");
  card.appendChild(el("div",null,{fontSize:"12px",fontWeight:700,color:"#38bdf8",marginBottom:"10px"},"📈 体重グラフ"));
  card.appendChild(svg);
  // サマリー
  const diff=allBw[allBw.length-1].bw-allBw[0].bw;
  const st=el("div",null,{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"10px"});
  [["最小",Math.min(...vals)+"kg"],["最大",Math.max(...vals)+"kg"],["増減",(diff>0?"+":"")+diff.toFixed(1)+"kg"]].forEach(([l,v])=>{
    const sc=el("div","card",{textAlign:"center",padding:"10px 6px",marginBottom:"0"});

    sc.appendChild(el("div",null,{fontSize:"10px",color:"#6b7280",marginTop:"3px"},l));
