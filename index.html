<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LIFTLOG">
<title>LIFTLOG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;color:#e8e6f0;font-family:-apple-system,system-ui,sans-serif;min-height:100vh}
input,select,textarea{-webkit-appearance:none;appearance:none;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<script>
const h = React.createElement;
const {useState,useMemo,useEffect} = React;
const {LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine} = Recharts;

const EXERCISES = ["ベンチプレス","スクワット","デッドリフト","ショルダープレス","懸垂","ダンベルカール","レッグプレス"];
const CONDITIONS = ["最高","良い","普通","やや疲れ","疲れ"];
const CCOLORS = {"最高":"#22c55e","良い":"#86efac","普通":"#facc15","やや疲れ":"#fb923c","疲れ":"#f87171"};
const GOAL_START = 78.2, GOAL_END_W = 70.0, GOAL_DATE = "2027-12-31";
const today = () => new Date().toISOString().slice(0,10);
const newSets = () => [{weight:"",reps:"",assist:null,drops:[]}];

function getTuesdays(start, end) {
  const r=[], d=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
  while(d.getDay()!==2) d.setDate(d.getDate()+1);
  while(d<=e){r.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+7);}
  return r;
}
function buildSchedule(sw,tw,sd,ed){
  const t=getTuesdays(sd,ed); if(!t.length) return {};
  const drop=sw-tw,steps=t.length-1,s={};
  t.forEach((d,i)=>{s[d]=Math.round((sw-drop/steps*i)*10)/10;});
  return s;
}
function fmtDur(m){return m?`${Math.floor(m/60)>0?Math.floor(m/60)+"時間":""}${m%60}分`:"—";}
function ls(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

const S = {
  card:{background:"#18181f",border:"1px solid #2a2a38",borderRadius:12,padding:14,marginBottom:13},
  label:{fontSize:11,fontWeight:700,letterSpacing:"0.08em",color:"#9ca3af",textTransform:"uppercase",marginBottom:5,display:"block"},
  inp:{width:"100%",background:"#0f0f13",border:"1px solid #2a2a38",borderRadius:8,color:"#e8e6f0",padding:"8px 10px",fontSize:14,outline:"none"},
  sel:{width:"100%",background:"#0f0f13",border:"1px solid #2a2a38",borderRadius:8,color:"#e8e6f0",padding:"8px 10px",fontSize:14,outline:"none"},
  btn:(v)=>({padding:v==="sm"?"5px 10px":"9px 14px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:v==="sm"?12:13,
    background:v==="primary"?"#c084fc":v==="danger"?"#2a1a1a":"#23232e",
    color:v==="primary"?"#0f0f13":v==="danger"?"#f87171":"#9ca3af"}),
  pill:(c)=>({display:"inline-block",padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:600,background:c+"22",color:c}),
  badge:{background:"#22c55e22",color:"#22c55e",borderRadius:8,padding:"8px 14px",textAlign:"center",fontWeight:600,fontSize:13,marginBottom:12},
};

function App() {
  const [tab,setTab] = useState("record");
  const [logs,setLogs] = useState(()=>ls("wt_logs")||[]);
  const [wLogs,setWLogs] = useState(()=>ls("wt_weightLogs")||[]);
  const [exOpts,setExOpts] = useState(()=>ls("wt_exOptions")||EXERCISES);
  const [maxRec,setMaxRec] = useState(()=>ls("wt_maxRecords")||{});
  // record form
  const [date,setDate] = useState(today());
  const [dur,setDur] = useState("");
  const [cond,setCond] = useState("良い");
  const [memo,setMemo] = useState("");
  const [exs,setExs] = useState([{name:EXERCISES[0],sets:newSets()}]);
  const [bw,setBw] = useState("");
  const [saved,setSaved] = useState(false);
  const [custEx,setCustEx] = useState("");
  const [exMode,setExMode] = useState({});
  // weight tab
  const [wDate,setWDate] = useState(today());
  const [wVal,setWVal] = useState("");
  const [wSaved,setWSaved] = useState(false);
  // max tab
  const [maxEx,setMaxEx] = useState(EXERCISES[0]);
  const [maxVal,setMaxVal] = useState("");
  const [maxSaved,setMaxSaved] = useState(false);
  // graph
  const [graphEx,setGraphEx] = useState(EXERCISES[0]);

  function saveLog(){
    const log={id:Date.now(),date,duration:Number(dur)||0,condition:cond,memo,exercises:exs,bodyWeight:Number(bw)||null};
    const next=[log,...logs]; setLogs(next); lsSet("wt_logs",next);
    setSaved(true); setTimeout(()=>setSaved(false),2000);
    setExs([{name:exOpts[0],sets:newSets()}]); setDur(""); setMemo(""); setCond("良い"); setBw("");
  }
  function delLog(id){const n=logs.filter(l=>l.id!==id);setLogs(n);lsSet("wt_logs",n);}
  function addEx(){setExs(p=>[...p,{name:exOpts[0],sets:newSets()}]);}
  function remEx(i){setExs(p=>p.filter((_,x)=>x!==i));}
  function updEx(i,f,v){setExs(p=>p.map((e,x)=>x===i?{...e,[f]:v}:e));}
  function addSet(i){setExs(p=>p.map((e,x)=>x===i?{...e,sets:[...e.sets,{weight:"",reps:"",assist:null,drops:[]}]}:e));}
  function remSet(i,j){setExs(p=>p.map((e,x)=>x===i?{...e,sets:e.sets.filter((_,y)=>y!==j)}:e));}
  function updSet(i,j,f,v){setExs(p=>p.map((e,x)=>x===i?{...e,sets:e.sets.map((s,y)=>y===j?{...s,[f]:v}:s)}:e));}
  function addDrop(i,j){setExs(p=>p.map((e,x)=>x!==i?e:{...e,sets:e.sets.map((s,y)=>y!==j?s:{...s,drops:[...(s.drops||[]),{weight:"",reps:""}]})}));}
  function remDrop(i,j,di){setExs(p=>p.map((e,x)=>x!==i?e:{...e,sets:e.sets.map((s,y)=>y!==j?s:{...s,drops:s.drops.filter((_,z)=>z!==di)})}));}
  function updDrop(i,j,di,f,v){setExs(p=>p.map((e,x)=>x!==i?e:{...e,sets:e.sets.map((s,y)=>y!==j?s:{...s,drops:s.drops.map((d,z)=>z!==di?d:{...d,[f]:v})})}));}
  function saveExOpts(n){setExOpts(n);lsSet("wt_exOptions",n);}
  function addCustEx(){const n=custEx.trim();if(n&&!exOpts.includes(n))saveExOpts([...exOpts,n]);setCustEx("");}
  function confirmEx(i,name){const t=name.trim();if(!t)return;updEx(i,"name",t);if(!exOpts.includes(t))saveExOpts([...exOpts,t]);setExMode(p=>({...p,[i]:"sel"}));}
  function saveWLog(){const v=Number(wVal);if(!v)return;const e={id:Date.now(),date:wDate,bw:v};const n=[e,...wLogs].sort((a,b)=>b.date.localeCompare(a.date));setWLogs(n);lsSet("wt_weightLogs",n);setWVal("");setWSaved(true);setTimeout(()=>setWSaved(false),2000);}
  function delWLog(id){const n=wLogs.filter(l=>l.id!==id);setWLogs(n);lsSet("wt_weightLogs",n);}
  function saveMax(){const v=Number(maxVal);if(!v)return;const n={...maxRec,[maxEx]:v};setMaxRec(n);lsSet("wt_maxRecords",n);setMaxVal("");setMaxSaved(true);setTimeout(()=>setMaxSaved(false),2000);}
  function delMax(name){const n={...maxRec};delete n[name];setMaxRec(n);lsSet("wt_maxRecords",n);}

  const allExNames = useMemo(()=>{const s=new Set(exOpts);logs.forEach(l=>l.exercises.forEach(e=>s.add(e.name)));return[...s];},[logs,exOpts]);
  const graphData = useMemo(()=>{const m={};logs.forEach(log=>{log.exercises.forEach(ex=>{if(ex.name===graphEx){const mw=Math.max(...ex.sets.map(s=>Number(s.weight)||0));if(!m[log.date]||m[log.date]<mw)m[log.date]=mw;}});});return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,w])=>({date:d,weight:w}));},[logs,graphEx]);

  const body = {padding:"14px 13px",maxWidth:520,margin:"0 auto"};
  const row = {display:"flex",gap:8};

  // tabs
  const tabs = h("div",{style:{display:"flex",background:"#18181f",borderBottom:"1px solid #2a2a38"}},
    [["record","📝 記録"],["history","📋 履歴"],["weight","⚖️ 体重"],["max","💪 MAX"],["graph","📈 グラフ"]].map(([k,l])=>
      h("button",{key:k,onClick:()=>setTab(k),style:{flex:1,padding:"11px 2px",fontSize:11,fontWeight:600,border:"none",cursor:"pointer",background:"none",color:tab===k?"#c084fc":"#6b7280",borderBottom:tab===k?"2px solid #c084fc":"2px solid transparent",whiteSpace:"nowrap"}},l)
    )
  );

  let content = null;

  if(tab==="record"){
    content = h("div",{style:body},
      saved&&h("div",{style:S.badge},"✅ 保存しました！"),
      h("div",{style:S.card},
        h("div",{style:row},
          h("div",{style:{flex:1}},h("label",{style:S.label},"日付"),h("input",{type:"date",style:S.inp,value:date,onChange:e=>setDate(e.target.value)})),
          h("div",{style:{flex:1}},h("label",{style:S.label},"時間（分）"),h("input",{type:"number",style:S.inp,placeholder:"60",value:dur,onChange:e=>setDur(e.target.value),min:"0"}))
        ),
        h("div",{style:{marginTop:9}},h("label",{style:S.label},"体重 (kg)"),h("input",{type:"number",style:S.inp,placeholder:"72.5",value:bw,onChange:e=>setBw(e.target.value),min:"0",step:"0.1"}))
      ),
      h("div",{style:S.card},
        h("label",{style:S.label},"体調"),
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
          CONDITIONS.map(c=>h("button",{key:c,onClick:()=>setCond(c),style:{...S.btn(),background:cond===c?CCOLORS[c]:"#23232e",color:cond===c?"#0f0f13":"#9ca3af",padding:"5px 11px",fontSize:12}},c))
        )
      ),
      ...exs.map((ex,i)=>
        h("div",{key:i,style:S.card},
          h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:10}},
            exMode[i]==="text"
              ? h("input",{autoFocus:true,style:{...S.inp,flex:1},defaultValue:ex.name,placeholder:"種目名を入力...",onBlur:e=>confirmEx(i,e.target.value),onKeyDown:e=>{if(e.key==="Enter")confirmEx(i,e.target.value);}})
              : h("select",{style:{...S.sel,flex:1},value:ex.name,onChange:e=>updEx(i,"name",e.target.value)},exOpts.map(o=>h("option",{key:o},o))),
            h("button",{onClick:()=>setExMode(p=>({...p,[i]:p[i]==="text"?"sel":"text"})),style:{...S.btn("ghost"),padding:"7px 8px",fontSize:13,flexShrink:0,color:exMode[i]==="text"?"#c084fc":"#6b7280"}},"✏️"),
            exs.length>1&&h("button",{style:S.btn("danger"),onClick:()=>remEx(i)},"✕")
          ),
          h("div",{style:{display:"grid",gridTemplateColumns:"18px 1fr 1fr auto",gap:5,marginBottom:6}},
            h("span"),h("span",{style:{fontSize:10,color:"#6b7280",fontWeight:700,textAlign:"center"}},"重量kg"),h("span",{style:{fontSize:10,color:"#6b7280",fontWeight:700,textAlign:"center"}},"回数"),h("span")
          ),
          ...ex.sets.map((s,j)=>
            h("div",{key:j,style:{marginBottom:10}},
              h("div",{style:{display:"flex",alignItems:"center",gap:4}},
                h("span",{style:{width:18,fontSize:11,color:"#6b7280",fontWeight:700,textAlign:"center",flexShrink:0}},j+1),
                h("input",{type:"number",style:{...S.inp,flex:1},placeholder:"kg",value:s.weight,onChange:e=>updSet(i,j,"weight",e.target.value),min:"0",step:"0.5"}),
                h("span",{style:{color:"#4b5563",fontSize:12,flexShrink:0}},"×"),
                h("input",{type:"number",style:{...S.inp,flex:1},placeholder:"rep",value:s.reps,onChange:e=>updSet(i,j,"reps",e.target.value),min:"0"}),
                h("button",{onClick:()=>updSet(i,j,"assist",s.assist!=null?null:""),style:{background:s.assist!=null?"#38bdf822":"#23232e",border:"none",borderRadius:6,color:s.assist!=null?"#38bdf8":"#6b7280",fontSize:10,fontWeight:700,padding:"5px 6px",cursor:"pointer",flexShrink:0}},"補"),
                h("button",{onClick:()=>addDrop(i,j),style:{background:s.drops&&s.drops.length?"#c084fc22":"#23232e",border:"none",borderRadius:6,color:s.drops&&s.drops.length?"#c084fc":"#6b7280",fontSize:10,fontWeight:700,padding:"5px 6px",cursor:"pointer",flexShrink:0}},"Drop"),
                ex.sets.length>1&&h("button",{onClick:()=>remSet(i,j),style:{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:15,padding:"0 2px",flexShrink:0}},"−")
              ),
              s.assist!=null&&h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:5,paddingLeft:24}},
                h("span",{style:{fontSize:11,color:"#38bdf8",fontWeight:700,flexShrink:0}},"＋補助"),
                h("input",{type:"number",min:"0",style:{...S.inp,flex:1,borderColor:"#38bdf844",color:"#38bdf8"},placeholder:"補助rep数",value:s.assist??"",onChange:e=>updSet(i,j,"assist",e.target.value)}),
                h("span",{style:{fontSize:11,color:"#38bdf8"}},"rep")
              ),
              ...(s.drops||[]).map((d,di)=>
                h("div",{key:di,style:{display:"flex",alignItems:"center",gap:4,marginTop:5,paddingLeft:24}},
                  h("span",{style:{fontSize:10,color:"#c084fc",fontWeight:700,flexShrink:0}},`↓Drop${di+1}`),
                  h("input",{type:"number",style:{...S.inp,flex:1,borderColor:"#c084fc44",color:"#c084fc"},placeholder:"kg",value:d.weight??"",onChange:e=>updDrop(i,j,di,"weight",e.target.value),min:"0",step:"0.5"}),
                  h("span",{style:{color:"#4b5563",fontSize:12,flexShrink:0}},"×"),
                  h("input",{type:"number",style:{...S.inp,flex:1,borderColor:"#c084fc44",color:"#c084fc"},placeholder:"rep",value:d.reps??"",onChange:e=>updDrop(i,j,di,"reps",e.target.value),min:"0"}),
                  h("button",{onClick:()=>remDrop(i,j,di),style:{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:15,padding:"0 2px",flexShrink:0}},"−")
                )
              )
            )
          ),
          h("button",{style:S.btn("sm"),onClick:()=>addSet(i)},"＋ セット追加")
        )
      ),
      h("div",{style:{...S.card,padding:10}},
        h("div",{style:row},
          h("input",{style:{...S.inp,flex:1},placeholder:"カスタム種目名を追加",value:custEx,onChange:e=>setCustEx(e.target.value),onKeyDown:e=>e.key==="Enter"&&addCustEx()}),
          h("button",{style:S.btn("ghost"),onClick:addCustEx},"追加")
        )
      ),
      h("button",{style:{...S.btn(),width:"100%",marginBottom:12},onClick:addEx},"＋ 種目を追加"),
      h("div",{style:S.card},h("label",{style:S.label},"メモ"),h("textarea",{style:{...S.inp,minHeight:64,resize:"vertical"},placeholder:"今日のトレーニングについて...",value:memo,onChange:e=>setMemo(e.target.value)})),
      h("button",{style:{...S.btn("primary"),width:"100%",fontSize:15,padding:"13px 0"},onClick:saveLog},"💾 記録を保存")
    );
  }

  if(tab==="history"){
    content = h("div",{style:body},
      logs.length===0
        ? h("div",{style:{textAlign:"center",color:"#6b7280",padding:48}},h("div",{style:{fontSize:40,marginBottom:12}},"🏋️"),h("div",{style:{fontWeight:600}},"まだ記録がありません"))
        : logs.map(log=>
          h("div",{key:log.id,style:{background:"#18181f",border:"1px solid #2a2a38",borderRadius:12,padding:12,marginBottom:10}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
              h("div",null,
                h("div",{style:{fontSize:14,fontWeight:700,color:"#e8e6f0",marginBottom:3}},log.date),
                h("div",{style:{fontSize:12,color:"#6b7280",marginBottom:6}},
                  log.duration?`⏱ ${fmtDur(log.duration)}`:"",
                  log.condition&&h("span",{style:S.pill(CCOLORS[log.condition]||"#6b7280")},log.condition),
                  log.bodyWeight&&h("span",{style:{marginLeft:6,color:"#9ca3af"}},`⚖️ ${log.bodyWeight}kg`)
                )
              ),
              h("button",{onClick:()=>delLog(log.id),style:{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:17}},"🗑")
            ),
            ...log.exercises.map((ex,i)=>
              h("div",{key:i,style:{marginBottom:7}},
                h("div",{style:{fontSize:12,fontWeight:700,color:"#c084fc",marginBottom:4}},ex.name),
                h("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
                  ex.sets.map((s,j)=>
                    h("div",{key:j,style:{display:"flex",flexDirection:"column",gap:2}},
                      h("span",{style:{background:"#23232e",borderRadius:5,padding:"2px 8px",fontSize:11,color:"#d1d5db"}},
                        `${j+1}: ${s.weight||"—"}kg×${s.reps||"—"}rep`,
                        s.assist!=null&&s.assist!==""&&h("span",{style:{color:"#38bdf8"}},` +(${s.assist}補助)`)
                      ),
                      ...(s.drops||[]).map((d,di)=>h("span",{key:di,style:{background:"#1e1230",borderRadius:5,padding:"2px 8px",fontSize:10,color:"#c084fc",marginLeft:8}},`↓ ${d.weight||"—"}kg×${d.reps||"—"}rep`))
                    )
                  )
                )
              )
            ),
            log.memo&&h("div",{style:{marginTop:6,fontSize:11,color:"#9ca3af",borderTop:"1px solid #2a2a38",paddingTop:6}},`💬 ${log.memo}`)
          )
        )
    );
  }

  if(tab==="weight"){
    const allBw=[...wLogs,...logs.filter(l=>l.bodyWeight).map(l=>({date:l.date,bw:l.bodyWeight}))].sort((a,b)=>a.date.localeCompare(b.date));
    const schedStart=allBw.length>0?allBw[0].date:"2025-06-22";
    const sched=buildSchedule(GOAL_START,GOAL_END_W,schedStart,GOAL_DATE);
    const tuesdays=Object.keys(sched).sort();
    const actMap={}; allBw.forEach(l=>{actMap[l.date]=l.bw;});
    const latestBw=allBw.length>0?allBw[allBw.length-1].bw:GOAL_START;
    const remaining=(latestBw-GOAL_END_W).toFixed(1);
    const daysLeft=Math.ceil((new Date(GOAL_DATE)-new Date())/86400000);
    const bwMap={}; wLogs.forEach(l=>{bwMap[l.date]=l.bw;}); logs.filter(l=>l.bodyWeight).forEach(l=>{if(!bwMap[l.date])bwMap[l.date]=l.bodyWeight;});
    const bwData=Object.entries(bwMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,bw])=>({date:d,bw}));
    const pct=Math.max(0,Math.min(100,((GOAL_START-latestBw)/(GOAL_START-GOAL_END_W))*100));

    content = h("div",{style:body},
      wSaved&&h("div",{style:S.badge},"✅ 体重を保存しました！"),
      h("div",{style:{...S.card,background:"linear-gradient(135deg,#0f172a,#1e1b4b)",border:"1px solid #38bdf844"}},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#38bdf8",marginBottom:8}},"🎯 目標"),
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
          h("div",null,h("div",{style:{fontSize:26,fontWeight:900,color:"#e8e6f0"}},`${GOAL_END_W}`,h("span",{style:{fontSize:13,color:"#6b7280"}},"kg")),h("div",{style:{fontSize:12,color:"#6b7280",marginTop:2}},"残り ",h("span",{style:{color:"#f87171",fontWeight:700}},`-${remaining}kg`)," ／ ",daysLeft,"日")),
          h("div",{style:{textAlign:"right"}},h("div",{style:{fontSize:11,color:"#6b7280"}},"現在"),h("div",{style:{fontSize:20,fontWeight:800,color:"#38bdf8"}},`${latestBw}kg`))
        ),
        h("div",{style:{marginTop:10,background:"#0f0f1380",borderRadius:99,height:6}},h("div",{style:{width:pct+"%",background:"linear-gradient(90deg,#38bdf8,#c084fc)",borderRadius:99,height:6}})),
        h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:3}},h("span",{style:{fontSize:10,color:"#4b5563"}},`${GOAL_START}kg`),h("span",{style:{fontSize:10,color:"#4b5563"}},`${GOAL_END_W}kg（${GOAL_DATE}）`))
      ),
      h("div",{style:S.card},
        h("div",{style:row},
          h("div",{style:{flex:1}},h("label",{style:S.label},"日付"),h("input",{type:"date",style:S.inp,value:wDate,onChange:e=>setWDate(e.target.value)})),
          h("div",{style:{flex:1}},h("label",{style:S.label},"体重 (kg)"),h("input",{type:"number",style:S.inp,placeholder:"72.5",value:wVal,onChange:e=>setWVal(e.target.value),min:"0",step:"0.1"}))
        ),
        h("button",{style:{...S.btn("primary"),width:"100%",marginTop:10},onClick:saveWLog},"⚖️ 体重を記録")
      ),
      bwData.length>=2&&h("div",{style:S.card},
        h("div",{style:{fontSize:12,fontWeight:700,color:"#38bdf8",marginBottom:12}},"📈 体重グラフ"),
        h(ResponsiveContainer,{width:"100%",height:200},
          h(LineChart,{data:bwData},
            h(CartesianGrid,{strokeDasharray:"3 3",stroke:"#2a2a38"}),
            h(XAxis,{dataKey:"date",tick:{fontSize:9,fill:"#6b7280"},tickLine:false}),
            h(YAxis,{tick:{fontSize:9,fill:"#6b7280"},tickLine:false,unit:"kg",domain:[Math.floor(Math.min(...bwData.map(d=>d.bw),GOAL_END_W))-1,Math.ceil(Math.max(...bwData.map(d=>d.bw)))+1]}),
            h(Tooltip,{contentStyle:{background:"#18181f",border:"1px solid #2a2a38",borderRadius:8,fontSize:12},formatter:v=>[`${v}kg`,"体重"]}),
            h(ReferenceLine,{y:GOAL_END_W,stroke:"#f87171",strokeDasharray:"4 3",label:{value:`目標${GOAL_END_W}kg`,position:"insideTopRight",fill:"#f87171",fontSize:9}}),
            h(Line,{type:"monotone",dataKey:"bw",stroke:"#38bdf8",strokeWidth:2.5,dot:{fill:"#38bdf8",r:4},activeDot:{r:6}})
          )
        )
      ),
      h("div",{style:S.card},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#6b7280",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8}},"📅 火曜日ペース目標"),
        h("div",{style:{maxHeight:280,overflowY:"auto"}},
          tuesdays.map(d=>{
            const target=sched[d],actual=actMap[d],isToday=d===today(),isPast=d<today(),diff=actual!=null?(actual-target).toFixed(1):null;
            return h("div",{key:d,style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4,padding:"6px 4px",borderBottom:"1px solid #2a2a38",background:isToday?"#38bdf811":"none"}},
              h("span",{style:{fontSize:11,color:isToday?"#38bdf8":isPast?"#4b5563":"#9ca3af",fontWeight:isToday?700:400}},d,isToday?" 🔵":""),
              h("span",{style:{fontSize:11,color:"#9ca3af",textAlign:"center"}},`${target}kg`),
              actual!=null
                ? h("span",{style:{fontSize:11,fontWeight:700,color:Number(diff)<=0?"#22c55e":"#f87171",textAlign:"right"}},`${actual}kg (${Number(diff)>0?"+":""}${diff})`)
                : h("span",{style:{fontSize:11,color:"#374151",textAlign:"right"}},isPast?"未記録":"—")
            );
          })
        )
      ),
      wLogs.length>0&&h("div",{style:S.card},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",marginBottom:8}},"記録一覧"),
        wLogs.map(l=>{
          const isTue=new Date(l.date+"T00:00:00").getDay()===2;
          return h("div",{key:l.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #2a2a38"}},
            h("span",{style:{fontSize:12,color:isTue?"#38bdf8":"#9ca3af"}},l.date,isTue?" 🔵":""),
            h("span",{style:{fontSize:15,fontWeight:700,color:"#38bdf8"}},`${l.bw}kg`),
            h("button",{onClick:()=>delWLog(l.id),style:{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:16}},"🗑")
          );
        })
      )
    );
  }

  if(tab==="max"){
    content = h("div",{style:body},
      maxSaved&&h("div",{style:S.badge},"✅ マックスを保存しました！"),
      h("div",{style:S.card},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",marginBottom:10}},"種目別マックス重量"),
        h("div",{style:row},
          h("select",{style:{...S.sel,flex:1},value:maxEx,onChange:e=>setMaxEx(e.target.value)},allExNames.map(n=>h("option",{key:n},n))),
          h("input",{type:"number",style:{...S.inp,flex:1},placeholder:"100",value:maxVal,onChange:e=>setMaxVal(e.target.value),min:"0",step:"0.5"})
        ),
        h("button",{style:{...S.btn("primary"),width:"100%",marginTop:10},onClick:saveMax},"💪 マックスを保存")
      ),
      Object.keys(maxRec).length===0
        ? h("div",{style:{textAlign:"center",color:"#6b7280",padding:40}},h("div",{style:{fontSize:40,marginBottom:12}},"💪"),h("div",{style:{fontWeight:600}},"まだ記録がありません"))
        : h("div",{style:S.card},
          Object.entries(maxRec).sort((a,b)=>b[1]-a[1]).map(([name,kg])=>
            h("div",{key:name,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #2a2a38"}},
              h("div",{style:{fontSize:13,fontWeight:700,color:"#e8e6f0"}},name),
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},
                h("span",{style:{fontSize:18,fontWeight:900,color:"#c084fc"}},kg,h("span",{style:{fontSize:11,color:"#6b7280"}},"kg")),
                h("button",{onClick:()=>delMax(name),style:{background:"none",border:"none",color:"#4b5563",cursor:"pointer",fontSize:16}},"🗑")
              )
            )
          )
        )
    );
  }

  if(tab==="graph"){
    content = h("div",{style:body},
      h("div",{style:S.card},h("label",{style:S.label},"種目"),h("select",{style:S.sel,value:graphEx,onChange:e=>setGraphEx(e.target.value)},allExNames.map(n=>h("option",{key:n},n)))),
      graphData.length<2
        ? h("div",{style:{textAlign:"center",color:"#6b7280",padding:48}},h("div",{style:{fontSize:40,marginBottom:12}},"📈"),h("div",{style:{fontWeight:600}},"データが足りません"),h("div",{style:{fontSize:12,marginTop:6}},"この種目を2回以上記録すると表示されます"))
        : h("div",{style:S.card},
          h("div",{style:{fontSize:12,fontWeight:700,color:"#c084fc",marginBottom:12}},`${graphEx} — 最大重量の推移`),
          h(ResponsiveContainer,{width:"100%",height:200},
            h(LineChart,{data:graphData},
              h(CartesianGrid,{strokeDasharray:"3 3",stroke:"#2a2a38"}),
              h(XAxis,{dataKey:"date",tick:{fontSize:9,fill:"#6b7280"},tickLine:false}),
              h(YAxis,{tick:{fontSize:9,fill:"#6b7280"},tickLine:false,unit:"kg"}),
              h(Tooltip,{contentStyle:{background:"#18181f",border:"1px solid #2a2a38",borderRadius:8,fontSize:12},formatter:v=>[`${v}kg`,"最大重量"]}),
              h(Line,{type:"monotone",dataKey:"weight",stroke:"#c084fc",strokeWidth:2.5,dot:{fill:"#c084fc",r:4},activeDot:{r:6}})
            )
          )
        ),
      graphData.length>0&&h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:8}},
        [["最大重量",Math.max(...graphData.map(d=>d.weight))+"kg"],["記録回数",graphData.length+"回"],["伸び",graphData.length>1?(graphData[graphData.length-1].weight-graphData[0].weight>0?"+":"")+(graphData[graphData.length-1].weight-graphData[0].weight)+"kg":"—"]].map(([l,v])=>
          h("div",{key:l,style:{...S.card,textAlign:"center",padding:"12px 6px",marginBottom:0}},h("div",{style:{fontSize:17,fontWeight:800,color:"#c084fc"}},v),h("div",{style:{fontSize:10,color:"#6b7280",marginTop:3}},l))
        )
      )
    );
  }

  return h("div",{style:{minHeight:"100vh",background:"#0f0f13",color:"#e8e6f0"}},
    h("div",{style:{background:"#18181f",borderBottom:"1px solid #2a2a38",padding:"13px 16px",display:"flex",alignItems:"center",gap:10}},
      h("span",{style:{fontSize:20,fontWeight:800,letterSpacing:"-0.5px",color:"#c084fc"}},"LIFT",h("span",{style:{color:"#e8e6f0"}},"LOG")),
      h("span",{style:{fontSize:11,color:"#6b7280",marginLeft:4}},"筋トレ記録")
    ),
    tabs,
    content
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
